<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Katt — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
            padding: 40px 24px;
        }

        .logo {
            width: 360px;
            height: 360px;
            object-fit: contain;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: #00e5ff;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="src/black_katt_transparent.png" alt="Black Katt Logo">
        <div class="divider"></div>
        <h1>Under Construction</h1>
        <p>Something great is coming soon</p>
    </div>
</body>
</html>
